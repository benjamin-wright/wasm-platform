apiVersion: batch/v1
kind: Job
metadata:
  # Named deterministically so re-deploys are idempotent (Job already exists → no-op).
  name: sql-hello-seed
  namespace: wasm-platform
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed
          image: postgres:15
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER"; do
                echo "waiting for postgres..."
                sleep 2
              done
              psql -c "
                CREATE TABLE IF NOT EXISTS greetings (
                  id     serial PRIMARY KEY,
                  name   text   NOT NULL UNIQUE,
                  active bool   NOT NULL DEFAULT true
                );
                INSERT INTO greetings (name, active) VALUES
                  ('Alice', true),
                  ('Bob',   true),
                  ('Carol', false)
                ON CONFLICT (name) DO UPDATE SET active = EXCLUDED.active;
              "
          envFrom:
            - secretRef:
                # Secret created by the db-operator for the 'app' SQL user.
                # Provides: PGUSER, PGPASSWORD, PGHOST, PGPORT.
                name: wasm-default-sql-hello-app-pg-creds
          env:
            - name: PGDATABASE
              value: wasm_default__sql_hello
