apiVersion: db-operator.benjamin-wright.github.com/v1alpha1
kind: NatsCluster
metadata:
  name: {{ .Release.Name }}-nats
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wp-databases.labels" . | nindent 4 }}
spec:
  natsVersion: {{ .Values.nats.version | quote }}
  jetStream:
    storageSize: {{ .Values.nats.jetStream.storageSize }}
---
apiVersion: db-operator.benjamin-wright.github.com/v1alpha1
kind: NatsAccount
metadata:
  name: {{ .Release.Name }}-nats-wp-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wp-databases.labels" . | nindent 4 }}
spec:
  clusterRef: {{ .Release.Name }}-nats
  users:
    - username: {{ .Values.nats.wpOperator.username }}
      secretName: {{ .Values.nats.wpOperator.secretName }}
      permissions:
        publish:
          allow:
            - ">"
        subscribe:
          allow:
            - ">"
---
apiVersion: db-operator.benjamin-wright.github.com/v1alpha1
kind: NatsAccount
metadata:
  name: {{ .Release.Name }}-nats-execution-host
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wp-databases.labels" . | nindent 4 }}
spec:
  clusterRef: {{ .Release.Name }}-nats
  users:
    - username: {{ .Values.nats.executionHost.username }}
      secretName: {{ .Values.nats.executionHost.secretName }}
      permissions:
        publish:
          allow:
            - ">"
        subscribe:
          allow:
            - ">"
  exports:
    - subject: "http.>"
      type: service
    - subject: "fn.>"
      type: service
---
apiVersion: db-operator.benjamin-wright.github.com/v1alpha1
kind: NatsAccount
metadata:
  name: {{ .Release.Name }}-nats-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wp-databases.labels" . | nindent 4 }}
spec:
  clusterRef: {{ .Release.Name }}-nats
  users:
    - username: {{ .Values.nats.gateway.username }}
      secretName: {{ .Values.nats.gateway.secretName }}
      permissions:
        publish:
          allow:
            - ">"
        subscribe:
          allow:
            - ">"
  imports:
    - account: {{ .Release.Name }}-nats-execution-host
      subject: "http.>"
      type: service
