image:
  repository: wasm-platform-registry.localhost:5001/wp-operator
  tag: latest
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

replicaCount: 1

grpc:
  port: 50051

# databases configures how the reconciler discovers db-operator-provisioned
# credentials. Override these at the platform level (e.g. in the wasm-platform
# umbrella chart values) to match the actual release name and secret names.
databases:
  # postgresDatabaseName is the name of the PostgresDatabase CR that
  # PostgresCredential CRs will reference.
  postgresDatabaseName: ""
  # redisSecretName is the name of the Secret holding Red credentials for the
  # wp-operator user provisioned by the wp-databases chart.
  redisSecretName: "wp-operator-redis-credentials"
  # redisSecretNamespace overrides the namespace for the Redis Secret.
  # Defaults to the operator's own namespace (POD_NAMESPACE) when empty.
  redisSecretNamespace: ""
