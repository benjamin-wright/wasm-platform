---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: applications.wasm-platform.io
spec:
  group: wasm-platform.io
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Application is the primary resource for wasm-platform.
          Each instance declares one or more deployable WASM functions and their shared runtime requirements.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationSpec defines the desired state of an Application.
            properties:
              env:
                additionalProperties:
                  type: string
                description: |-
                  Env is an optional map of environment variables injected into all functions'
                  runtime configuration.
                type: object
              functions:
                description: |-
                  Functions is the list of deployable functions in this Application.
                  Each function has its own module and trigger.
                items:
                  description: FunctionSpec declares a single deployable function
                    within an Application.
                  properties:
                    module:
                      description: |-
                        Module is the OCI URI for the .wasm module.
                        Use a digest-pinned reference (@sha256:…) for deterministic deployments.
                        Format: oci://<registry>/<repository>@sha256:<digest>.
                      type: string
                    name:
                      description: Name is the identifier for this function, unique
                        within the Application.
                      minLength: 1
                      type: string
                    trigger:
                      description: Trigger defines the event source for this function.
                      properties:
                        http:
                          description: |-
                            HTTP declares this function as HTTP-triggered and exposed via the gateway.
                            The gateway auto-generates the internal NATS subject as http.<namespace>.<app-name>.<function-name>.
                            Mutually exclusive with Topic.
                          properties:
                            methods:
                              description: |-
                                Methods is the list of HTTP methods the gateway accepts on this path.
                                If omitted, all methods are allowed.
                                Valid values: GET, HEAD, POST, PUT, DELETE, PATCH, OPTIONS.
                              items:
                                description: HttpMethod is a valid HTTP method string.
                                enum:
                                - GET
                                - HEAD
                                - POST
                                - PUT
                                - DELETE
                                - PATCH
                                - OPTIONS
                                type: string
                              type: array
                            path:
                              description: |-
                                Path is the URL path the gateway exposes for this function.
                                Must start with '/'. Must be unique cluster-wide.
                              pattern: ^/
                              type: string
                          required:
                          - path
                          type: object
                        topic:
                          description: |-
                            Topic is the message subject the execution host subscribes to.
                            Messages on this subject invoke the function's on-message export.
                            Must not contain wildcard characters ('*' or '>'); topics are unique cluster-wide.
                            Mutually exclusive with HTTP.
                          pattern: ^[^*>]+$
                          type: string
                      type: object
                      x-kubernetes-validations:
                      - message: exactly one of trigger.http or trigger.topic must
                          be set
                        rule: has(self.http) != has(self.topic)
                  required:
                  - module
                  - name
                  - trigger
                  type: object
                minItems: 1
                type: array
              metrics:
                description: |-
                  Metrics is the list of user-defined Prometheus metrics declared by this Application.
                  Names must be unique within the Application and cluster-wide; the operator enforces
                  cluster-wide uniqueness at reconcile time (oldest Application wins).
                items:
                  description: |-
                    MetricDefinition declares a single user-defined Prometheus metric.
                    Names are globally unique — the operator enforces cluster-wide uniqueness at reconcile time.
                  properties:
                    labels:
                      description: |-
                        Labels is the list of label key names for this metric.
                        Each key must match [a-zA-Z_][a-zA-Z0-9_]*. Max 10 entries.
                        Must not include 'app_name' or 'app_namespace' (injected by the execution host).
                      items:
                        type: string
                      maxItems: 10
                      type: array
                    name:
                      description: |-
                        Name is the Prometheus metric name. Must match [a-zA-Z_:][a-zA-Z0-9_:]*, max 64 characters.
                        Must not start with '__' (Prometheus reserved prefix). Unique cluster-wide.
                      pattern: ^[a-zA-Z_:][a-zA-Z0-9_:]{0,63}$
                      type: string
                    type:
                      description: Type is the Prometheus metric type.
                      enum:
                      - counter
                      - gauge
                      type: string
                  required:
                  - name
                  - type
                  type: object
                  x-kubernetes-validations:
                  - message: metric name must not start with '__' (Prometheus reserved
                      prefix)
                    rule: '!self.name.startsWith(''__'')'
                  - message: labels must not include 'app_name' or 'app_namespace'
                      (host-injected labels)
                    rule: '!has(self.labels) || !self.labels.exists(l, l == ''app_name''
                      || l == ''app_namespace'')'
                maxItems: 50
                type: array
              sql:
                description: |-
                  SQL is the logical database name exposed to all functions via the sql host import.
                  Must correspond to a provisioned database managed by the db-operator.
                  Omit to disable SQL access.
                type: string
            required:
            - functions
            type: object
          status:
            description: ApplicationStatus defines the observed state of an Application.
            properties:
              conditions:
                description: Conditions is the standard Kubernetes condition list.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
