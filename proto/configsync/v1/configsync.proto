syntax = "proto3";

package configsync.v1;

option go_package = "github.com/benjamin-wright/wasm-platform/wp-operator/internal/grpc/configsync";

service ConfigSync {
  // Host requests full configuration snapshot (on startup or desync)
  rpc RequestFullConfig(FullConfigRequest) returns (FullConfigResponse);

  // Bidirectional stream: operator pushes incremental updates; host streams acks
  rpc PushIncrementalUpdate(stream IncrementalUpdateAck) returns (stream IncrementalUpdateRequest);
}

// ── Full config flow ──────────────────────────────────────────────────────────

message FullConfigRequest {
  string host_id = 1;
  optional int64 last_ack_timestamp = 2;
}

message FullConfigResponse {
  FullConfig config = 1;
  bool success = 2;
  string message = 3;
}

message FullConfig {
  string version = 1;
  repeated ApplicationConfig applications = 2;
  int64 timestamp = 3;
}

// ── Incremental update flow ───────────────────────────────────────────────────

message IncrementalUpdateRequest {
  IncrementalConfig incremental_config = 1;
  string target_host_id = 2;
}

message IncrementalUpdateAck {
  string host_id = 1;
  string version_applied = 2;
  bool success = 3;
  string message = 4;
}

message IncrementalConfig {
  string version = 1;
  repeated AppUpdate updates = 2;
  int64 timestamp = 3;
}

message AppUpdate {
  ApplicationConfig app_config = 1;
  bool delete = 2;
}

// ── Shared application model ──────────────────────────────────────────────────

enum WorldType {
  WORLD_TYPE_MESSAGE = 0;
  WORLD_TYPE_HTTP = 1;
}

// ApplicationConfig carries all per-application configuration pushed to
// execution hosts.  Application-level fields (env, sql_users) are shared
// across all functions in the application.  Per-function configuration lives in
// the functions list.
message ApplicationConfig {
  string name = 1;
  string namespace = 2;
  repeated FunctionConfig functions = 3;
  map<string, string> env = 4;
  repeated SqlUserConfig sql_users = 5;
  repeated MetricDefinition metrics = 7;
}

// FunctionConfig describes a single deployable function within an Application.
message FunctionConfig {
  string name = 1;
  string module_ref = 2;
  WorldType world_type = 3;
  // topic is set for message-application functions.
  optional string topic = 4;
  // http_config is set for http-application functions.
  optional HttpConfig http_config = 5;
  // sql_username references an entry in ApplicationConfig.sql_users.
  // Absent when the function has no SQL access.
  optional string sql_username = 6;
}

// SqlUserConfig carries the derived PG username and full connection URL for a
// single provisioned database user.  Passwords are encapsulated in the URL.
message SqlUserConfig {
  // username is the derived PG username (≤63 chars), used as the pool map key.
  string username = 1;
  // connection_url is the full postgres://user:pass@host:port/dbname URL.
  string connection_url = 2;
}

message HttpConfig {
  string path = 1;
  repeated string methods = 2;
}

// MetricType is the Prometheus metric type for a user-defined metric.
enum MetricType {
  METRIC_TYPE_COUNTER = 0;
  METRIC_TYPE_GAUGE = 1;
}

// MetricDefinition describes a single user-defined Prometheus metric declared
// by an Application.  The execution host pre-registers the metric on config
// arrival; guests increment it via the counter-increment WIT host function.
message MetricDefinition {
  string name = 1;
  MetricType type = 2;
  repeated string label_keys = 3;
}
